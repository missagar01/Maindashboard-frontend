name: Deploy Frontend to S3

on:
  push:
    branches:
      - "master"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 🔐 CREATE .env FROM GITHUB SECRETS
      - name: Create .env for build
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" >> .env
           echo "VITE_TRANSPORT_EMAIL=${{ secrets.VITE_TRANSPORT_EMAIL }}" >> .env
          echo "VITE_TRANSPORT_PASSWORD=${{ secrets.VITE_TRANSPORT_PASSWORD }}" >> .env

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy hashed assets to S3
        run: |
          aws s3 sync dist/assets s3://${{ secrets.S3_BUCKET }}/assets \
            --cache-control "public,max-age=31536000,immutable"

      - name: Deploy other static files to S3
        run: |
          aws s3 sync dist s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --exclude "assets/*" \
            --exclude "index.html" \
            --cache-control "public,max-age=300,must-revalidate"

      - name: Deploy index.html with no-cache headers
        run: |
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          if [ -n "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
              --paths "/" "/index.html"
          else
            echo "CLOUDFRONT_DISTRIBUTION_ID not set, skipping invalidation."
          fi

